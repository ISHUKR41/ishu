kind = "web"
previewPath = "/"
title = "Ishu - India's Premier Education & Tools Platform"
version = "1.0.0"
id = "artifacts/ishu"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25142

[services.development]
run = "pnpm --filter @workspace/ishu run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ishu", "run", "build" ]
publicDir = "artifacts/ishu/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25142"
BASE_PATH = "/"
